<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 320px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; }
  h2 { margin: 0 0 12px; font-size: 16px; }
  button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px; color: white; background: #2563eb; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #94a3b8; cursor: default; }
  #status { margin-top: 12px; padding: 8px; border-radius: 4px; display: none; font-size: 13px; }
  .success { background: #dcfce7; color: #166534; display: block !important; }
  .error { background: #fee2e2; color: #991b1b; display: block !important; }
  .info { color: #64748b; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Cookie Export</h2>
  <button id="exportBtn">Export Cookies + Signature</button>
  <div id="status"></div>
  <div class="info">
    Exports all browser cookies + fingerprint signature<br>
    to <code>storageState.json</code> for Docker MCP containers.<br><br>
    Captures: UA, platform, screen, WebGL,<br>
    Client Hints, languages, timezone, hardware.<br><br>
    Save the file to: <code>docker/shared/</code>
  </div>
  <script src="popup.js"></script>
</body>
</html>
